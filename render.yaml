services:
  - type: web
    name: securitygateapp
    runtime: node
    region: oregon
    plan: free
    rootDir: SecurityGateCommunityHub-js-API
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://securitygateapp.onrender.com/api/auth/google/callback
      - key: FRONTEND_URL
        value: https://gate-community-hub.vercel.app
